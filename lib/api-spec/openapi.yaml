openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MC Server Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Server configuration
  - name: mods
    description: Mod library management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get server configuration
      responses:
        "200":
          description: Current server config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfig"
    put:
      operationId: updateConfig
      tags: [config]
      summary: Update server configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerConfigInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfig"

  /mods:
    get:
      operationId: listMods
      tags: [mods]
      summary: List all mods
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of mods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mod"
    post:
      operationId: uploadMod
      tags: [mods]
      summary: Upload a mod file (max 200MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ModUpload"
      responses:
        "201":
          description: Uploaded mod
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mod"
        "400":
          description: Invalid file or exceeds 200MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mods/{id}:
    get:
      operationId: getMod
      tags: [mods]
      summary: Get a single mod
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mod details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mod"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateMod
      tags: [mods]
      summary: Update mod metadata or toggle enabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModUpdate"
      responses:
        "200":
          description: Updated mod
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mod"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteMod
      tags: [mods]
      summary: Delete a mod
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mods/stats:
    get:
      operationId: getModStats
      tags: [mods]
      summary: Get mod library stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    ServerConfig:
      type: object
      properties:
        id:
          type: integer
        serverIp:
          type: string
        customDomain:
          type: string
        maxRamGb:
          type: integer
        minRamGb:
          type: integer
        serverName:
          type: string
        motd:
          type: string
        maxPlayers:
          type: integer
        javaPort:
          type: integer
        bedrockPort:
          type: integer
        updatedAt:
          type: string
      required:
        - id
        - serverIp
        - customDomain
        - maxRamGb
        - minRamGb
        - serverName
        - motd
        - maxPlayers
        - javaPort
        - bedrockPort
        - updatedAt

    ServerConfigInput:
      type: object
      properties:
        serverIp:
          type: string
        customDomain:
          type: string
        maxRamGb:
          type: integer
          minimum: 1
          maximum: 12
        minRamGb:
          type: integer
          minimum: 1
          maximum: 12
        serverName:
          type: string
        motd:
          type: string
        maxPlayers:
          type: integer
          minimum: 1
          maximum: 500
        javaPort:
          type: integer
        bedrockPort:
          type: integer

    Mod:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        filename:
          type: string
        description:
          type: string
        version:
          type: string
        author:
          type: string
        category:
          type: string
        sizeBytes:
          type: integer
        filePath:
          type: string
        enabled:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - filename
        - description
        - version
        - author
        - category
        - sizeBytes
        - filePath
        - enabled
        - createdAt
        - updatedAt

    ModUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
        name:
          type: string
        description:
          type: string
        version:
          type: string
        author:
          type: string
        category:
          type: string
      required:
        - file
        - name

    ModUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        author:
          type: string
        category:
          type: string
        enabled:
          type: string

    ModStats:
      type: object
      properties:
        total:
          type: integer
        enabled:
          type: integer
        disabled:
          type: integer
        totalSizeBytes:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
      required:
        - total
        - enabled
        - disabled
        - totalSizeBytes
        - byCategory
